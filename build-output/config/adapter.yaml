appName: ondc-gateway-validator
log:
  level: info
  destinations:
    - type: stdout
  contextKeys:
    - transaction_id
    - message_id
    - subscriber_id
    - module_id
http:
  port: 3001
  timeout:
    read: 30
    write: 30
    idle: 30
pluginManager:
  root: ./plugins
modules:
  - name: validator_ONDCFIS12_230_bap
    path: /ondc/ONDC:FIS12/2.3.0/validate/
    handler:
      type: std
      role: bap
      httpClientConfig: &ref_0
        maxIdleConns: 1000
        maxIdleConnsPerHost: 200
        idleConnTimeout: 300s
        responseHeaderTimeout: 5s
      plugins:
        schemaValidator: &ref_1
          id: schemavalidator
          config:
            schemaDir: ./schemas
        ondcValidator:
          id: ondcvalidator_ONDCFIS12_230_bap
          config:
            stateFullValidations: true
            debugMode: false
      steps: &ref_2
        - validateSchema
        - validateOndcPayload
  - name: validator_ONDCFIS12_200_bap
    path: /ondc/ONDC:FIS12/2.0.0/validate/
    handler:
      type: std
      role: bap
      httpClientConfig: *ref_0
      plugins:
        schemaValidator: *ref_1
        ondcValidator:
          id: ondcvalidator_ONDCFIS12_200_bap
          config:
            stateFullValidations: false
            debugMode: false
      steps: *ref_2
