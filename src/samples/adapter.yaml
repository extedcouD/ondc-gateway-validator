appName: workbench-onix-ONDC:TRV11-2.0.1
log:
    level: debug
    destinations:
        - type: stdout
    contextKeys:
        - transaction_id
        - message_id
        - subscriber_id
        - module_id
http:
    port: 3001
    timeout:
        read: 30
        write: 30
        idle: 30
pluginManager:
    root: ./plugins
modules:
    - name: validatorTRV11_201
      path: /ondc/ONDC:TRV11/2.0.1/validate/
      handler:
          type: std
          role: bap
          httpClientConfig: &ref_0
              maxIdleConns: 1000
              maxIdleConnsPerHost: 200
              idleConnTimeout: 300s
              responseHeaderTimeout: 5s
          plugins:
              schemaValidator:
                  id: schemavalidator
                  config:
                      schemaDir: ./schemas
              ondcValidator:
                  id: ondcvalidator_TRV11_201
                  config:
                      stateFullValidations: false
                      debugMode: false
          steps:
              - validateSchema
              - validateOndcPayload
